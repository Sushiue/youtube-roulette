name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/youtube_roulette?schema=public
      DIRECT_DATABASE_URL: postgresql://user:pass@localhost:5432/youtube_roulette?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: test-secret-test-secret-test-secret
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      REALTIME_JWT_SECRET: realtime-secret-realtime-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_REALTIME_SERVER_URL: http://localhost:4000
      CLIENT_URL: http://localhost:3000
      PORT: "4000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build monorepo
        run: npm run build
