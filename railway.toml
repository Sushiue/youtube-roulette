[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/realtime/Dockerfile"
watchPatterns = [
  "apps/realtime/**",
  "packages/shared/**",
  "prisma/**",
  "package.json",
  "package-lock.json",
  "tsconfig.base.json"
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
